<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>📷 Camera Network Manager</title>
    <style>
      /* =================================================================
         CSS Variables & Reset
         ================================================================= */
      :root {
        --green: #02d07d;
        --green-hover: #02b570;
        --green-light: #00ff88;
        --blue: #00ccff;
        --black: #000;
        --dark: #0a0a0a;
        --dark-card: #111;
        --dark-border: #333;
        --text: #f0f0f0;
        --text-secondary: #ccc;
        --text-muted: #888;
        --glass-bg: rgba(255, 255, 255, 0.03);
        --glass-border: rgba(255, 255, 255, 0.08);
        --radius: 16px;
        --radius-sm: 10px;
        --shadow: 0 8px 32px rgba(0, 0, 0, 0.4);
        --transition: 0.3s cubic-bezier(0.4, 0, 0.2, 1);
      }

      *, *::before, *::after {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
      }

      body {
        font-family: "Segoe UI", -apple-system, BlinkMacSystemFont, sans-serif;
        background: var(--dark);
        color: var(--text);
        min-height: 100dvh;
        overflow-x: hidden;
        -webkit-font-smoothing: antialiased;
      }

      /* =================================================================
         Loading Overlay
         ================================================================= */
      #loading-overlay {
        position: fixed;
        inset: 0;
        z-index: 9999;
        display: none;
        align-items: center;
        justify-content: center;
        background: rgba(0, 0, 0, 0.75);
        backdrop-filter: blur(12px);
        -webkit-backdrop-filter: blur(12px);
      }

      #loading-overlay.active {
        display: flex;
      }

      .loader-box {
        text-align: center;
        animation: fadeInUp 0.3s ease;
      }

      .spinner {
        width: 52px;
        height: 52px;
        border: 3px solid var(--dark-border);
        border-top-color: var(--green);
        border-right-color: var(--blue);
        border-radius: 50%;
        animation: spin 0.8s linear infinite;
        margin: 0 auto 18px;
      }

      .loader-box p {
        color: var(--text-secondary);
        font-size: 0.95rem;
        letter-spacing: 0.3px;
      }

      @keyframes spin {
        to {
          transform: rotate(360deg);
        }
      }

      @keyframes fadeInUp {
        from {
          opacity: 0;
          transform: translateY(12px);
        }
        to {
          opacity: 1;
          transform: translateY(0);
        }
      }

      @keyframes fadeIn {
        from {
          opacity: 0;
        }
        to {
          opacity: 1;
        }
      }

      @keyframes slideDown {
        from {
          opacity: 0;
          transform: translateY(-16px);
        }
        to {
          opacity: 1;
          transform: translateY(0);
        }
      }

      @keyframes pulse {
        0%, 100% {
          opacity: 1;
        }
        50% {
          opacity: 0.5;
        }
      }

      /* =================================================================
         Background Atmosphere
         ================================================================= */
      body::before {
        content: "";
        position: fixed;
        inset: 0;
        background:
          radial-gradient(
            ellipse 600px 400px at 10% 20%,
            rgba(2, 208, 125, 0.06),
            transparent
          ),
          radial-gradient(
          ellipse 500px 500px at 90% 80%,
          rgba(0, 204, 255, 0.05),
          transparent
        );
        pointer-events: none;
        z-index: 0;
      }

      /* =================================================================
         Login Screen
         ================================================================= */
      #login-screen {
        display: none;
        min-height: 100dvh;
        align-items: center;
        justify-content: center;
        padding: 24px;
        position: relative;
        z-index: 1;
      }

      #login-screen.active {
        display: flex;
      }

      .login-card {
        width: 100%;
        max-width: 400px;
        background: var(--glass-bg);
        border: 1px dashed var(--dark-border);
        border-radius: var(--radius);
        padding: 40px 32px;
        box-shadow: var(--shadow);
        backdrop-filter: blur(20px);
        -webkit-backdrop-filter: blur(20px);
        animation: fadeInUp 0.5s ease;
      }

      .login-card .brand {
        text-align: center;
        margin-bottom: 32px;
      }

      .login-card .brand .emoji {
        font-size: 3rem;
        display: block;
        margin-bottom: 12px;
        filter: drop-shadow(0 0 20px rgba(2, 208, 125, 0.4));
      }

      .login-card .brand h1 {
        font-size: 1.4rem;
        font-weight: 700;
        background: linear-gradient(135deg, var(--green), var(--blue));
        -webkit-background-clip: text;
        -webkit-text-fill-color: transparent;
        background-clip: text;
      }

      .login-card .brand p {
        color: var(--text-muted);
        font-size: 0.85rem;
        margin-top: 6px;
      }

      .form-group {
        margin-bottom: 18px;
      }

      .form-group label {
        display: block;
        font-size: 0.8rem;
        color: var(--text-secondary);
        margin-bottom: 6px;
        text-transform: uppercase;
        letter-spacing: 0.8px;
        font-weight: 600;
      }

      .form-group input, .form-group select {
        width: 100%;
        padding: 12px 14px;
        background: rgba(255, 255, 255, 0.04);
        border: 1px solid var(--dark-border);
        border-radius: var(--radius-sm);
        color: var(--text);
        font-size: 0.95rem;
        outline: none;
        transition:
          border-color var(--transition),
          box-shadow var(--transition);
      }

      .form-group input::placeholder {
        color: var(--text-muted);
      }

      .form-group input:focus {
        border-color: var(--green);
        box-shadow: 0 0 0 3px rgba(2, 208, 125, 0.15);
      }

      /* =================================================================
         Buttons
         ================================================================= */
      .btn {
        display: inline-flex;
        align-items: center;
        justify-content: center;
        gap: 8px;
        padding: 12px 24px;
        border: none;
        border-radius: var(--radius-sm);
        font-size: 0.9rem;
        font-weight: 600;
        cursor: pointer;
        transition: all var(--transition);
        letter-spacing: 0.3px;
      }

      .btn-primary {
        width: 100%;
        background: linear-gradient(135deg, var(--green), var(--green-hover));
        color: #000;
        box-shadow: 0 4px 20px rgba(2, 208, 125, 0.25);
      }

      .btn-primary:hover {
        transform: translateY(-2px);
        box-shadow: 0 6px 28px rgba(2, 208, 125, 0.35);
      }

      .btn-primary:active {
        transform: translateY(0);
      }

      .btn-secondary {
        background: rgba(255, 255, 255, 0.06);
        color: var(--text);
        border: 1px solid var(--dark-border);
      }

      .btn-secondary:hover {
        background: rgba(255, 255, 255, 0.1);
        border-color: var(--green);
      }

      .btn-danger {
        background: rgba(255, 60, 60, 0.12);
        color: #ff5555;
        border: 1px solid rgba(255, 60, 60, 0.2);
      }

      .btn-danger:hover {
        background: rgba(255, 60, 60, 0.2);
        transform: translateY(-1px);
      }

      .btn-sm {
        padding: 8px 16px;
        font-size: 0.82rem;
      }

      /* =================================================================
         Main Dashboard
         ================================================================= */
      #dashboard {
        display: none;
        min-height: 100dvh;
        position: relative;
        z-index: 1;
      }

      #dashboard.active {
        display: block;
        animation: fadeIn 0.4s ease;
      }

      /* Header */
      .header {
        display: flex;
        align-items: center;
        justify-content: space-between;
        padding: 16px 20px;
        background: rgba(0, 0, 0, 0.5);
        backdrop-filter: blur(16px);
        -webkit-backdrop-filter: blur(16px);
        border-bottom: 1px solid var(--glass-border);
        position: sticky;
        top: 0;
        z-index: 100;
      }

      .header .logo {
        display: flex;
        align-items: center;
        gap: 10px;
      }

      .header .logo span.emoji {
        font-size: 1.6rem;
      }

      .header .logo h2 {
        font-size: 1.05rem;
        font-weight: 700;
        background: linear-gradient(135deg, var(--green), var(--blue));
        -webkit-background-clip: text;
        -webkit-text-fill-color: transparent;
        background-clip: text;
      }

      .btn-logout {
        padding: 8px 16px;
        font-size: 0.8rem;
        background: rgba(255, 255, 255, 0.05);
        border: 1px solid var(--dark-border);
        border-radius: var(--radius-sm);
        color: var(--text-secondary);
        cursor: pointer;
        transition: all var(--transition);
      }

      .btn-logout:hover {
        color: #ff5555;
        border-color: rgba(255, 60, 60, 0.4);
        background: rgba(255, 60, 60, 0.08);
      }

      /* Content container */
      .content {
        padding: 20px;
        max-width: 800px;
        margin: 0 auto;
      }

      /* =================================================================
         Search Bar
         ================================================================= */
      .search-section {
        margin-bottom: 24px;
      }

      .search-wrap {
        display: flex;
        gap: 10px;
      }

      .search-wrap input {
        flex: 1;
        padding: 12px 16px;
        background: rgba(255, 255, 255, 0.04);
        border: 1px solid var(--dark-border);
        border-radius: var(--radius-sm);
        color: var(--text);
        font-size: 0.95rem;
        outline: none;
        transition:
          border-color var(--transition),
          box-shadow var(--transition);
      }

      .search-wrap input:focus {
        border-color: var(--green);
        box-shadow: 0 0 0 3px rgba(2, 208, 125, 0.12);
      }

      .search-wrap input::placeholder {
        color: var(--text-muted);
      }

      .search-wrap .btn {
        flex-shrink: 0;
      }

      /* =================================================================
         Section titles
         ================================================================= */
      .section-title {
        font-size: 0.78rem;
        text-transform: uppercase;
        letter-spacing: 1.2px;
        color: var(--text-muted);
        margin-bottom: 14px;
        font-weight: 600;
      }

      /* =================================================================
         Camera Cards
         ================================================================= */
      .camera-list {
        display: flex;
        flex-direction: column;
        gap: 14px;
      }

      .camera-card {
        background: var(--glass-bg);
        border: 1px dashed var(--dark-border);
        border-radius: var(--radius);
        padding: 20px;
        transition: all var(--transition);
        animation: slideDown 0.35s ease backwards;
      }

      .camera-card:hover {
        transform: translateY(-2px);
        box-shadow: 0 8px 30px rgba(2, 208, 125, 0.08);
        border-color: rgba(2, 208, 125, 0.25);
      }

      .camera-card-header {
        display: flex;
        align-items: flex-start;
        justify-content: space-between;
        gap: 12px;
        margin-bottom: 12px;
      }

      .camera-info h3 {
        font-size: 1.05rem;
        font-weight: 600;
        color: var(--text);
        margin-bottom: 4px;
      }

      .camera-meta {
        display: flex;
        flex-wrap: wrap;
        gap: 12px;
        font-size: 0.8rem;
        color: var(--text-muted);
      }

      .camera-meta span {
        display: inline-flex;
        align-items: center;
        gap: 4px;
      }

      /* Status badges */
      .status-badge {
        display: inline-flex;
        align-items: center;
        gap: 6px;
        padding: 5px 12px;
        border-radius: 20px;
        font-size: 0.78rem;
        font-weight: 600;
        letter-spacing: 0.3px;
      }

      .status-badge.connected {
        background: rgba(2, 208, 125, 0.12);
        color: var(--green);
        border: 1px solid rgba(2, 208, 125, 0.25);
      }

      .status-badge.connecting {
        background: rgba(0, 204, 255, 0.1);
        color: var(--blue);
        border: 1px solid rgba(0, 204, 255, 0.2);
        animation: pulse 1.5s infinite;
      }

      .status-badge.reconnecting {
        background: rgba(255, 170, 0, 0.1);
        color: #ffaa00;
        border: 1px solid rgba(255, 170, 0, 0.2);
        animation: pulse 1.5s infinite;
      }

      .status-badge.error {
        background: rgba(255, 60, 60, 0.1);
        color: #ff5555;
        border: 1px solid rgba(255, 60, 60, 0.2);
      }

      .status-badge.disconnected {
        background: rgba(255, 255, 255, 0.04);
        color: var(--text-muted);
        border: 1px solid var(--dark-border);
      }

      .error-message {
        margin-top: 8px;
        padding: 10px 14px;
        background: rgba(255, 60, 60, 0.06);
        border: 1px solid rgba(255, 60, 60, 0.15);
        border-radius: var(--radius-sm);
        color: #ff7777;
        font-size: 0.82rem;
        line-height: 1.4;
        word-break: break-word;
      }

      .camera-actions {
        display: flex;
        gap: 8px;
        margin-top: 14px;
        flex-wrap: wrap;
      }

      /* =================================================================
         Stream Viewer (canvas inside card)
         ================================================================= */
      .stream-viewer {
        margin-top: 14px;
        border-radius: var(--radius-sm);
        overflow: hidden;
        background: #000;
        position: relative;
        aspect-ratio: 16/9;
        border: 1px solid var(--dark-border);
      }

      .stream-viewer canvas {
        width: 100%;
        height: 100%;
        display: block;
        object-fit: contain;
      }

      .stream-placeholder {
        position: absolute;
        inset: 0;
        display: flex;
        align-items: center;
        justify-content: center;
        color: var(--text-muted);
        font-size: 0.85rem;
        gap: 8px;
      }

      /* =================================================================
         Connection Modal
         ================================================================= */
      .modal-overlay {
        position: fixed;
        inset: 0;
        z-index: 5000;
        display: none;
        align-items: center;
        justify-content: center;
        background: rgba(0, 0, 0, 0.7);
        backdrop-filter: blur(8px);
        -webkit-backdrop-filter: blur(8px);
        padding: 20px;
      }

      .modal-overlay.active {
        display: flex;
      }

      .modal {
        width: 100%;
        max-width: 440px;
        max-height: 90dvh;
        overflow-y: auto;
        background: var(--dark-card);
        border: 1px solid var(--dark-border);
        border-radius: var(--radius);
        padding: 28px 24px;
        box-shadow: 0 20px 60px rgba(0, 0, 0, 0.6);
        animation: fadeInUp 0.3s ease;
      }

      .modal h3 {
        font-size: 1.15rem;
        font-weight: 700;
        margin-bottom: 6px;
        display: flex;
        align-items: center;
        gap: 8px;
      }

      .modal p.subtitle {
        color: var(--text-muted);
        font-size: 0.83rem;
        margin-bottom: 22px;
      }

      .modal-actions {
        display: flex;
        gap: 10px;
        margin-top: 24px;
      }

      .modal-actions .btn {
        flex: 1;
      }

      /* =================================================================
         Empty States
         ================================================================= */
      .empty-state {
        text-align: center;
        padding: 48px 24px;
        color: var(--text-muted);
      }

      .empty-state .emoji {
        font-size: 3rem;
        display: block;
        margin-bottom: 14px;
        opacity: 0.5;
      }

      .empty-state p {
        font-size: 0.9rem;
        line-height: 1.5;
      }

      /* =================================================================
         Responsive
         ================================================================= */
      @media (min-width: 640px) {
        .content {
          padding: 28px;
        }

        .login-card {
          padding: 48px 40px;
        }

        .camera-card {
          padding: 24px;
        }
      }

      /* Scrollbar */
      ::-webkit-scrollbar {
        width: 6px;
      }

      ::-webkit-scrollbar-track {
        background: transparent;
      }

      ::-webkit-scrollbar-thumb {
        background: var(--dark-border);
        border-radius: 3px;
      }
    </style>
  </head>
  <body>
    <!-- ===== Loading Overlay ===== -->
    <div id="loading-overlay">
      <div class="loader-box">
        <div class="spinner"></div>
        <p id="loading-text">Loading…</p>
      </div>
    </div>

    <!-- ===== Login Screen ===== -->
    <div id="login-screen">
      <div class="login-card">
        <div class="brand">
          <span class="emoji">📡</span>
          <h1>Grex ID</h1>
          <p>Sign in to manage your cameras</p>
        </div>
        <div class="form-group">
          <label for="login-user">👤 Username</label>
          <input
            type="text"
            id="login-user"
            placeholder="Enter your username"
            autocomplete="username"
          />
        </div>
        <div class="form-group">
          <label for="login-pass">🔒 Password</label>
          <input
            type="password"
            id="login-pass"
            placeholder="Enter your password"
            autocomplete="current-password"
          />
        </div>
        <button class="btn btn-primary" id="login-btn">🚀 Sign In</button>
      </div>
    </div>

    <!-- ===== Dashboard ===== -->
    <div id="dashboard">
      <header class="header">
        <div class="logo">
          <span class="emoji">📡</span>
          <h2>Grex ID</h2>
        </div>
        <button class="btn-logout" id="logout-btn">🚪 Logout</button>
      </header>

      <div class="content">
        <!-- Search -->
        <section class="search-section">
          <div class="search-wrap">
            <input
              type="text"
              id="search-input"
              placeholder="🔍 Search cameras by name…"
            />
            <button class="btn btn-primary btn-sm" id="search-btn">
              Search
            </button>
          </div>
        </section>

        <!-- Connections -->
        <div id="connections-section" style="display: none">
          <h4 class="section-title">⚡ Active Connections</h4>
          <div class="camera-list" id="connections-list"></div>
          <div style="height: 24px"></div>
        </div>

        <!-- Search results -->
        <h4 class="section-title">📷 Available Cameras</h4>
        <div class="camera-list" id="camera-list">
          <div class="empty-state">
            <span class="emoji">🔍</span>
            <p>Search for cameras on your network to get started.</p>
          </div>
        </div>
      </div>
    </div>

    <!-- ===== Connection Modal ===== -->
    <div class="modal-overlay" id="connect-modal">
      <div class="modal">
        <h3>🔗 Connect Camera</h3>
        <p class="subtitle">Enter the RTSP stream details for this camera.</p>
        <div class="form-group">
          <label for="conn-name">📷 Camera Name (optional rename)</label>
          <input type="text" id="conn-name" placeholder="e.g. Living Room" />
        </div>
        <div class="form-group">
          <label for="conn-user">👤 RTSP Username</label>
          <input type="text" id="conn-user" placeholder="admin" />
        </div>
        <div class="form-group">
          <label for="conn-pass">🔒 RTSP Password</label>
          <input type="password" id="conn-pass" placeholder="password" />
        </div>
        <div class="form-group">
          <label for="conn-ip">🌐 IP Address</label>
          <input type="text" id="conn-ip" placeholder="192.168.1.100" />
        </div>
        <div class="form-group">
          <label for="conn-port">🔌 Port</label>
          <input type="text" id="conn-port" placeholder="554" value="554" />
        </div>
        <div class="form-group">
          <label for="conn-path">📂 Stream Path</label>
          <input type="text" id="conn-path" placeholder="stream1" />
        </div>
        <input type="hidden" id="conn-mac" />
        <input type="hidden" id="conn-original-name" />
        <div class="modal-actions">
          <button class="btn btn-secondary" id="modal-cancel">Cancel</button>
          <button class="btn btn-primary" id="modal-save">⚡ Connect</button>
        </div>
      </div>
    </div>

    <!-- ===== Application Script ===== -->
    <script>
      // =================================================================
      // DOM References
      // =================================================================

      const dom = {
        loading: document.getElementById("loading-overlay"),
        loadingText: document.getElementById("loading-text"),
        loginScreen: document.getElementById("login-screen"),
        dashboard: document.getElementById("dashboard"),
        loginUser: document.getElementById("login-user"),
        loginPass: document.getElementById("login-pass"),
        loginBtn: document.getElementById("login-btn"),
        logoutBtn: document.getElementById("logout-btn"),
        searchInput: document.getElementById("search-input"),
        searchBtn: document.getElementById("search-btn"),
        cameraList: document.getElementById("camera-list"),
        connectionsSection: document.getElementById("connections-section"),
        connectionsList: document.getElementById("connections-list"),
        modal: document.getElementById("connect-modal"),
        connName: document.getElementById("conn-name"),
        connUser: document.getElementById("conn-user"),
        connPass: document.getElementById("conn-pass"),
        connIp: document.getElementById("conn-ip"),
        connPort: document.getElementById("conn-port"),
        connPath: document.getElementById("conn-path"),
        connMac: document.getElementById("conn-mac"),
        connOrigName: document.getElementById("conn-original-name"),
        modalCancel: document.getElementById("modal-cancel"),
        modalSave: document.getElementById("modal-save"),
      };

      // =================================================================
      // State
      // =================================================================

      let cameras = [];
      let connections = [];
      const streamSockets = new Map(); // connectionId → WebSocket

      // =================================================================
      // Loading Overlay
      // =================================================================

      function showLoading(message = "Loading…") {
        dom.loadingText.textContent = message;
        dom.loading.classList.add("active");
      }

      function hideLoading() {
        dom.loading.classList.remove("active");
      }

      // =================================================================
      // API Helpers
      // =================================================================

      async function api(path, options = {}) {
        const res = await fetch(path, {
          headers: { "Content-Type": "application/json" },
          ...options,
        });
        return res.json();
      }

      // =================================================================
      // Auth
      // =================================================================

      async function checkAuth() {
        const { loggedIn } = await api("/api/status");
        return loggedIn;
      }

      async function performLogin() {
        const username = dom.loginUser.value.trim();
        const password = dom.loginPass.value.trim();
        if (!username || !password) return;

        showLoading("Authenticating…");
        try {
          await api("/api/login", {
            method: "POST",
            body: JSON.stringify({ username, password }),
          });
          await initDashboard();
        } catch (err) {
          alert("Login failed: " + err.message);
        } finally {
          hideLoading();
        }
      }

      async function performLogout() {
        showLoading("Signing out…");
        closeAllStreams();
        await api("/api/logout", { method: "POST" });
        connections = [];
        cameras = [];
        dom.dashboard.classList.remove("active");
        dom.loginScreen.classList.add("active");
        dom.loginUser.value = "";
        dom.loginPass.value = "";
        hideLoading();
      }

      // =================================================================
      // Camera Discovery
      // =================================================================

      async function searchCameras() {
        const query = dom.searchInput.value.trim().toLowerCase();
        showLoading("Scanning network…");
        try {
          const data = await api("/api/cameras");
          cameras = data.cameras || [];
          renderCameras(query);
        } catch (err) {
          console.error("Search failed:", err);
        } finally {
          hideLoading();
        }
      }

      // =================================================================
      // Connections
      // =================================================================

      async function loadConnections() {
        try {
          const data = await api("/api/connections");
          connections = data.connections || [];
          renderConnections();
        } catch (err) {
          console.error("Failed to load connections:", err);
        }
      }

      async function saveConnection() {
        const conn = {
          cameraName: dom.connName.value.trim() || dom.connOrigName.value,
          username: dom.connUser.value.trim(),
          password: dom.connPass.value.trim(),
          ip: dom.connIp.value.trim(),
          port: dom.connPort.value.trim(),
          path: dom.connPath.value.trim(),
          mac: dom.connMac.value,
        };

        if (
          !conn.username || !conn.password || !conn.ip || !conn.port ||
          !conn.path
        ) {
          alert("Please fill in all required fields.");
          return;
        }

        closeModal();
        showLoading("Connecting camera…");
        try {
          const data = await api("/api/connections", {
            method: "POST",
            body: JSON.stringify(conn),
          });
          await loadConnections();
          // Open WebSocket for the new connection.
          if (data.connection) {
            openStreamSocket(data.connection.id);
          }
        } catch (err) {
          alert("Failed to save connection: " + err.message);
        } finally {
          hideLoading();
        }
      }

      async function deleteConnection(id) {
        if (!confirm("Disconnect and remove this camera?")) return;
        showLoading("Disconnecting…");
        closeStreamSocket(id);
        try {
          await api("/api/connections", {
            method: "DELETE",
            body: JSON.stringify({ id }),
          });
          await loadConnections();
        } catch (err) {
          console.error("Delete failed:", err);
        } finally {
          hideLoading();
        }
      }

      // =================================================================
      // WebSocket Stream Management
      // =================================================================

      function openStreamSocket(connectionId) {
        if (streamSockets.has(connectionId)) return;

        const protocol = location.protocol === "https:" ? "wss:" : "ws:";
        const ws = new WebSocket(
          `${protocol}//${location.host}/api/stream/${connectionId}`,
        );

        ws.onmessage = (event) => {
          try {
            const msg = JSON.parse(event.data);

            if (msg.type === "status") {
              updateConnectionStatus(msg.connectionId, msg.status, msg.error);
            }

            if (msg.type === "frame") {
              drawFrame(msg.connectionId || connectionId, msg.data);
            }
          } catch { /* ignore */ }
        };

        ws.onclose = () => {
          streamSockets.delete(connectionId);
          // Try to reconnect after a short delay.
          setTimeout(() => {
            if (connections.some((c) => c.id === connectionId)) {
              openStreamSocket(connectionId);
            }
          }, 3000);
        };

        ws.onerror = () => {
          ws.close();
        };

        streamSockets.set(connectionId, ws);
      }

      function closeStreamSocket(id) {
        const ws = streamSockets.get(id);
        if (ws) {
          ws.close();
          streamSockets.delete(id);
        }
      }

      function closeAllStreams() {
        for (const [id, ws] of streamSockets) {
          ws.close();
        }
        streamSockets.clear();
      }

      function drawFrame(connectionId, base64Data) {
        const canvas = document.getElementById(`canvas-${connectionId}`);
        if (!canvas) return;

        const ctx = canvas.getContext("2d");
        const img = new Image();
        img.onload = () => {
          canvas.width = img.width;
          canvas.height = img.height;
          ctx.drawImage(img, 0, 0);

          // Hide placeholder.
          const placeholder = document.getElementById(
            `placeholder-${connectionId}`,
          );
          if (placeholder) placeholder.style.display = "none";
        };
        img.src = "data:image/jpeg;base64," + base64Data;
      }

      function updateConnectionStatus(connectionId, status, error) {
        // Update local state.
        const conn = connections.find((c) => c.id === connectionId);
        if (conn) {
          conn.streamStatus = status;
          conn.streamError = error;
        }
        // Re-render just the status elements.
        const badgeEl = document.getElementById(`badge-${connectionId}`);
        if (badgeEl) {
          badgeEl.className = `status-badge ${status}`;
          badgeEl.innerHTML = statusEmoji(status) + " " + capitalise(status);
        }
        const errorEl = document.getElementById(`error-${connectionId}`);
        if (errorEl) {
          if (status === "error" || status === "reconnecting") {
            errorEl.style.display = "block";
            errorEl.textContent = error || "Unknown error";
          } else {
            errorEl.style.display = "none";
          }
        }
      }

      // =================================================================
      // Rendering
      // =================================================================

      function statusEmoji(s) {
        const map = {
          connected: "🟢",
          connecting: "🔵",
          reconnecting: "🟡",
          error: "🔴",
          disconnected: "⚪",
        };
        return map[s] || "⚪";
      }

      function capitalise(s) {
        return s.charAt(0).toUpperCase() + s.slice(1);
      }

      function renderCameras(query = "") {
        const filtered = cameras.filter((c) =>
          c.name.toLowerCase().includes(query)
        );

        if (filtered.length === 0) {
          dom.cameraList.innerHTML = `
          <div class="empty-state">
            <span class="emoji">📭</span>
            <p>${
            cameras.length === 0
              ? "No cameras found. Try searching again."
              : "No cameras match your search."
          }</p>
          </div>`;
          return;
        }

        dom.cameraList.innerHTML = filtered.map((cam, i) => `
        <div class="camera-card" style="animation-delay:${i * 0.06}s">
          <div class="camera-card-header">
            <div class="camera-info">
              <h3>📷 ${esc(cam.name)}</h3>
              <div class="camera-meta">
                <span>🌐 ${esc(cam.ip)}</span>
                <span>🔗 ${esc(cam.mac)}</span>
              </div>
            </div>
          </div>
          <div class="camera-actions">
            <button class="btn btn-primary btn-sm"
              onclick="openConnectModal('${esc(cam.name)}', '${
          esc(cam.ip)
        }', '${esc(cam.mac)}')">
              ⚡ Connect
            </button>
          </div>
        </div>
      `).join("");
      }

      function renderConnections() {
        if (connections.length === 0) {
          dom.connectionsSection.style.display = "none";
          return;
        }

        dom.connectionsSection.style.display = "block";
        dom.connectionsList.innerHTML = connections.map((c, i) => {
          const status = c.streamStatus || "disconnected";
          const error = c.streamError || "";
          const showError = status === "error" || status === "reconnecting";

          return `
          <div class="camera-card" style="animation-delay:${i * 0.06}s">
            <div class="camera-card-header">
              <div class="camera-info">
                <h3>📷 ${esc(c.cameraName)}</h3>
                <div class="camera-meta">
                  <span>🌐 ${esc(c.ip)}:${esc(c.port)}</span>
                  <span>🔗 ${esc(c.mac)}</span>
                </div>
              </div>
              <span id="badge-${c.id}" class="status-badge ${status}">
                ${statusEmoji(status)} ${capitalise(status)}
              </span>
            </div>

            <div id="error-${c.id}" class="error-message"
              style="display:${showError ? "block" : "none"}">
              ${esc(error)}
            </div>

            <div class="stream-viewer">
              <canvas id="canvas-${c.id}"></canvas>
              <div id="placeholder-${c.id}" class="stream-placeholder">
                ${
            status === "connected"
              ? ""
              : statusEmoji(status) + " " + (status === "connecting"
                ? "Connecting…"
                : status === "reconnecting"
                ? "Reconnecting…"
                : "Waiting for stream…")
          }
              </div>
            </div>

            <div class="camera-actions">
              <button class="btn btn-secondary btn-sm"
                onclick="manualReconnect('${c.id}')">
                🔄 Reconnect
              </button>
              <button class="btn btn-danger btn-sm"
                onclick="deleteConnection('${c.id}')">
                🗑️ Disconnect
              </button>
            </div>
          </div>`;
        }).join("");
      }

      function esc(str) {
        const d = document.createElement("div");
        d.textContent = str;
        return d.innerHTML;
      }

      // =================================================================
      // Modal
      // =================================================================

      function openConnectModal(name, ip, mac) {
        dom.connName.value = name;
        dom.connOrigName.value = name;
        dom.connIp.value = ip;
        dom.connMac.value = mac;
        dom.connUser.value = "";
        dom.connPass.value = "";
        dom.connPort.value = "554";
        dom.connPath.value = "";
        dom.modal.classList.add("active");
      }

      function closeModal() {
        dom.modal.classList.remove("active");
      }

      // =================================================================
      // Manual reconnect
      // =================================================================

      function manualReconnect(connectionId) {
        const ws = streamSockets.get(connectionId);
        if (ws && ws.readyState === WebSocket.OPEN) {
          ws.send(JSON.stringify({ type: "reconnect" }));
        } else {
          closeStreamSocket(connectionId);
          openStreamSocket(connectionId);
        }
      }

      // =================================================================
      // Initialisation
      // =================================================================

      async function initDashboard() {
        dom.loginScreen.classList.remove("active");
        dom.dashboard.classList.add("active");
        await loadConnections();
        // Open WebSocket for each existing connection.
        for (const conn of connections) {
          openStreamSocket(conn.id);
        }
      }

      async function boot() {
        showLoading("Starting up…");
        try {
          const loggedIn = await checkAuth();
          if (loggedIn) {
            await initDashboard();
          } else {
            dom.loginScreen.classList.add("active");
          }
        } catch (err) {
          console.error("Boot error:", err);
          dom.loginScreen.classList.add("active");
        } finally {
          hideLoading();
        }
      }

      // =================================================================
      // Event Listeners
      // =================================================================

      dom.loginBtn.addEventListener("click", performLogin);
      dom.loginPass.addEventListener("keydown", (e) => {
        if (e.key === "Enter") performLogin();
      });
      dom.loginUser.addEventListener("keydown", (e) => {
        if (e.key === "Enter") dom.loginPass.focus();
      });

      dom.logoutBtn.addEventListener("click", performLogout);

      dom.searchBtn.addEventListener("click", searchCameras);
      dom.searchInput.addEventListener("keydown", (e) => {
        if (e.key === "Enter") searchCameras();
      });

      dom.modalCancel.addEventListener("click", closeModal);
      dom.modalSave.addEventListener("click", saveConnection);
      dom.modal.addEventListener("click", (e) => {
        if (e.target === dom.modal) closeModal();
      });

      // =================================================================
      // Boot
      // =================================================================

      boot();
    </script>
  </body>
</html>
